name = "msr-tier-bot"
main = "src/index.js"
compatibility_date = "2025-09-01"

# Non-secret config (safe to commit). >>> EDIT GH_REPO <<<
[vars]
GH_REPO   = "YOUR_GITHUB_USERNAME/YOUR_REPO_NAME"
GH_BRANCH = "main"
DATA_PATH = "data.json"

# Secrets are NOT stored here. Set them once with:
#   npx wrangler secret put DISCORD_PUBLIC_KEY
#   npx wrangler secret put GH_TOKEN
